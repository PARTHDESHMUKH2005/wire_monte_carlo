# ── LiveRisk — Render Deployment Config ─────────────────────────────────
# Deploys both the backend (FastAPI) and frontend (Next.js) on Render.
#
# Steps:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com/select-repo
#   3. Select this repo — Render auto-detects render.yaml
#   4. Add the required env vars (see .env.example)
#   5. Deploy — both services spin up automatically
#
# Dashboard: https://dashboard.render.com

services:

  # ── Backend: FastAPI Web Service ─────────────────────────────────────
  - type: web
    name: liverisk-api
    runtime: python
    repo: https://github.com/PARTHDESHMUKH2005/wire_monte_carlo
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WIRE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health

  # ── Frontend: Next.js Web Service ────────────────────────────────────
  - type: web
    name: liverisk-ui
    runtime: node
    repo: https://github.com/PARTHDESHMUKH2005/wire_monte_carlo
    region: oregon
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: liverisk-api
          property: host
