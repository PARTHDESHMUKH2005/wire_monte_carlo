services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET:-liverisk-jwt-secret-key-2024-abcdef1234567890}
    volumes:
      - ./backend:/app
      - backend_data:/app/.risk_cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
